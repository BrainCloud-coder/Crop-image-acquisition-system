{% extends admin_base_template %}
{% block body %}

<style>
    .card {
        box-shadow: 0 0.125rem 0.5rem rgba(0, 0, 0, 0.1);
        border: 1px solid rgba(0, 0, 0, 0.125);
        border-radius: 0.5rem;
        margin-bottom: 1.5rem;
        transition: transform 0.2s;
    }

    .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 0.25rem 0.75rem rgba(0, 0, 0, 0.15);
    }

    .card-title {
        color: #2c3e50;
        font-weight: 600;
        margin-bottom: 0;
        font-size: 1.1rem;
    }

    .table th {
        border-top: none;
        font-weight: 500;
        background-color: #f8f9fa;
    }

    .form-inline .form-group {
        align-items: center;
        margin-right: 1rem;
    }

    .form-inline label {
        margin-right: 0.5rem;
        margin-bottom: 0;
        font-weight: 500;
    }

    .loading-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.8);
        z-index: 9999;
        justify-content: center;
        align-items: center;
    }

    .spinner {
        width: 3rem;
        height: 3rem;
    }

    .chart-container {
        position: relative;
        height: 250px;
        width: 100%;
    }

    .stat-card {
        text-align: center;
        padding: 1rem;
    }

    .stat-value {
        font-size: 1.8rem;
        font-weight: 700;
    }

    .stat-label {
        font-size: 0.9rem;
        color: #6c757d;
    }

    .positive-trend {
        color: #28a745;
    }

    .negative-trend {
        color: #dc3545;
    }
</style>

<body>
    <div>
        <!-- 数据摘要 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="stat-value" id="avgMoisture">--</div>
                    <div class="stat-label">平均含水率 (%)</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="stat-value" id="avgTemperature">--</div>
                    <div class="stat-label">平均温度 (°C)</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="stat-value" id="avgConductivity">--</div>
                    <div class="stat-label">平均电导率</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="stat-value" id="avgPh">--</div>
                    <div class="stat-label">平均pH值</div>
                </div>
            </div>
        </div>

        <!-- 数据筛选控件 -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <form id="filterForm" class="form-inline">
                            <div class="form-group mr-3">
                                <label for="timeRange" class="mr-2">时间范围:</label>
                                <select id="timeRange" class="form-control">
                                    <option value="1">最近1小时</option>
                                    <option value="6">最近6小时</option>
                                    <option value="24" selected>最近24小时</option>
                                    <option value="72">最近3天</option>
                                    <option value="168">最近7天</option>
                                    <option value="custom">自定义</option>
                                </select>
                            </div>
                            <div id="customRange" class="form-group mr-3" style="display:none;">
                                <label for="startDate" class="mr-2">开始:</label>
                                <input type="datetime-local" id="startDate" class="form-control mr-2">
                                <label for="endDate" class="mr-2">结束:</label>
                                <input type="datetime-local" id="endDate" class="form-control">
                            </div>
                            <!-- <button type="submit" class="btn btn-primary">
                                <i class="bi bi-filter"></i> 应用筛选
                            </button> -->
                            <button type="button" id="refreshBtn" class="btn btn-outline-secondary ml-2">
                                <i class="bi bi-arrow-clockwise"></i> 刷新
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- 图表容器 -->
        <div class="row">
            <!-- 土壤体积含水率图表 -->
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">土壤体积含水率变化 (%)</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="moistureChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 温度图表 -->
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">温度变化 (°C)</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="temperatureChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 电导率图表 -->
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">电导率变化</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="conductivityChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PH值图表 -->
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">PH值变化</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="phChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-border text-primary spinner" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
    </div>
</body>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@1.0.0/dist/chartjs-adapter-moment.min.js"></script>
<script>
    // 全局变量存储图表实例
    let moistureChart, temperatureChart, conductivityChart, phChart;

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function () {
        // 获取当前北京时间 (UTC+8)
        const beijingOffset = 16 * 60; // 北京时区偏移分钟数
        const localOffset = new Date().getTimezoneOffset(); // 本地时区偏移分钟数
        const diffMinutes = beijingOffset + localOffset; // 北京时间与本地时间的差异分钟数
        
        // 设置默认时间范围 (当前北京时间)
        const endDate = new Date(Date.now() + diffMinutes * 60 * 1000);
        const startDate = new Date(endDate);
        startDate.setHours(startDate.getHours() - 24);

        document.getElementById('startDate').value = formatDateTimeLocal(startDate);
        document.getElementById('endDate').value = formatDateTimeLocal(endDate);

        // 初始化图表
        initCharts();

        // 加载数据
        loadSensorData();

        // 绑定筛选表单提交事件
        document.getElementById('filterForm').addEventListener('submit', function (e) {
            e.preventDefault();
            loadSensorData();
        });

        // 绑定刷新按钮事件
        document.getElementById('refreshBtn').addEventListener('click', function () {
            loadSensorData();
        });

        // 自定义时间范围选择显示/隐藏
        document.getElementById('timeRange').addEventListener('change', function () {
            const customRange = document.getElementById('customRange');
            customRange.style.display = this.value === 'custom' ? 'block' : 'none';
        });
    });

    // 初始化图表
    function initCharts() {
        const chartOptions = {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    type: 'time',
                    time: {
                        tooltipFormat: 'YYYY-MM-DD HH:mm',
                        displayFormats: {
                            hour: 'MM-DD HH:mm',
                            day: 'MM-DD'
                        }
                    },
                    title: {
                        display: true,
                        text: '时间'
                    }
                },
                y: {
                    title: {
                        display: true,
                        text: '值'
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    mode: 'index',
                    intersect: false
                }
            }
        };

        // 初始化土壤体积含水率图表
        const moistureCtx = document.getElementById('moistureChart').getContext('2d');
        moistureChart = new Chart(moistureCtx, {
            type: 'line',
            data: {
                datasets: [{
                    label: '土壤体积含水率(%)',
                    borderColor: 'rgb(54, 162, 235)',
                    backgroundColor: 'rgba(54, 162, 235, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 5
                }]
            },
            options: chartOptions
        });

        // 初始化温度图表
        const temperatureCtx = document.getElementById('temperatureChart').getContext('2d');
        temperatureChart = new Chart(temperatureCtx, {
            type: 'line',
            data: {
                datasets: [{
                    label: '温度(°C)',
                    borderColor: 'rgb(255, 99, 132)',
                    backgroundColor: 'rgba(255, 99, 132, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 5
                }]
            },
            options: chartOptions
        });

        // 初始化电导率图表
        const conductivityCtx = document.getElementById('conductivityChart').getContext('2d');
        conductivityChart = new Chart(conductivityCtx, {
            type: 'line',
            data: {
                datasets: [{
                    label: '电导率',
                    borderColor: 'rgb(75, 192, 192)',
                    backgroundColor: 'rgba(75, 192, 192, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 5
                }]
            },
            options: chartOptions
        });

        // 初始化PH值图表
        const phCtx = document.getElementById('phChart').getContext('2d');
        phChart = new Chart(phCtx, {
            type: 'line',
            data: {
                datasets: [{
                    label: 'PH值',
                    borderColor: 'rgb(153, 102, 255)',
                    backgroundColor: 'rgba(153, 102, 255, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 5
                }]
            },
            options: chartOptions
        });
    }

    // 加载传感器数据
    function loadSensorData() {
        showLoading();

        const timeRange = document.getElementById('timeRange').value;
        let startDate, endDate;

        if (timeRange === 'custom') {
            // 修复：从input获取值并转换为Date对象
            const startStr = document.getElementById('startDate').value;
            const endStr = document.getElementById('endDate').value;

            if (!startStr || !endStr) {
                alert('请选择开始和结束时间');
                hideLoading();
                return;
            }

            // 将本地时间转换为UTC时间
            startDate = new Date(startStr);
            endDate = new Date(endStr);
        } else {
            // 计算时间范围
            const hours = parseInt(timeRange);
            
            // 获取当前北京时间 (UTC+8)
            const beijingOffset = 16 * 60; // 北京时区偏移分钟数
            const localOffset = new Date().getTimezoneOffset(); // 本地时区偏移分钟数
            const diffMinutes = beijingOffset + localOffset; // 北京时间与本地时间的差异分钟数
            
            endDate = new Date(Date.now() + diffMinutes * 60 * 1000);
            startDate = new Date(endDate);
            startDate.setHours(startDate.getHours() - hours);
        }

        // 发送AJAX请求获取数据
        // 把ISO字符串中的毫秒部分去掉，避免URL中出现类似 .572 的小数部分
        const isoStart = startDate.toISOString().replace(/\.\d{3}Z$/, 'Z');
        const isoEnd = endDate.toISOString().replace(/\.\d{3}Z$/, 'Z');

        fetch('/admin/sensordata/json?' + new URLSearchParams({
            start: isoStart,
            end: isoEnd
        }))
            .then(response => {
                if (!response.ok) {
                    throw new Error('网络响应错误');
                }
                return response.json();
            })
            .then(data => {
                // 更新图表
                updateCharts(data);

                // 更新统计数据
                updateStats(data);

                hideLoading();
            })
            .catch(error => {
                console.error('获取传感器数据失败:', error);
                alert('获取传感器数据失败，请稍后重试: ' + error.message);
                hideLoading();
            });
    }

    // 更新图表数据
    function updateCharts(data) {
        if (!data || data.length === 0) {
            // 没有数据时显示提示
            const noDataText = '暂无数据';

            moistureChart.data.labels = [];
            moistureChart.data.datasets[0].data = [];
            moistureChart.options.plugins.title = { display: true, text: noDataText };
            moistureChart.update();

            temperatureChart.data.labels = [];
            temperatureChart.data.datasets[0].data = [];
            temperatureChart.options.plugins.title = { display: true, text: noDataText };
            temperatureChart.update();

            conductivityChart.data.labels = [];
            conductivityChart.data.datasets[0].data = [];
            conductivityChart.options.plugins.title = { display: true, text: noDataText };
            conductivityChart.update();

            phChart.data.labels = [];
            phChart.data.datasets[0].data = [];
            phChart.options.plugins.title = { display: true, text: noDataText };
            phChart.update();

            return;
        }

        // 准备图表数据
        const moistureData = data.map(item => ({ x: new Date(item.timestamp), y: item.moisture }));
        const temperatureData = data.map(item => ({ x: new Date(item.timestamp), y: item.temperature }));
        const conductivityData = data.map(item => ({ x: new Date(item.timestamp), y: item.conductivity }));
        const phData = data.map(item => ({ x: new Date(item.timestamp), y: item.ph }));

        // 更新土壤体积含水率图表
        moistureChart.data.datasets[0].data = moistureData;
        moistureChart.options.plugins.title = { display: false };
        moistureChart.update();

        // 更新温度图表
        temperatureChart.data.datasets[0].data = temperatureData;
        temperatureChart.options.plugins.title = { display: false };
        temperatureChart.update();

        // 更新电导率图表
        conductivityChart.data.datasets[0].data = conductivityData;
        conductivityChart.options.plugins.title = { display: false };
        conductivityChart.update();

        // 更新PH值图表
        phChart.data.datasets[0].data = phData;
        phChart.options.plugins.title = { display: false };
        phChart.update();
    }

    // 更新统计数据
    function updateStats(data) {
        if (!data || data.length === 0) {
            document.getElementById('avgMoisture').textContent = '--';
            document.getElementById('avgTemperature').textContent = '--';
            document.getElementById('avgConductivity').textContent = '--';
            document.getElementById('avgPh').textContent = '--';
            return;
        }

        // 计算平均值
        const validMoisture = data.filter(item => item.moisture !== null);
        const validTemperature = data.filter(item => item.temperature !== null);
        const validConductivity = data.filter(item => item.conductivity !== null);
        const validPh = data.filter(item => item.ph !== null);

        const avgMoisture = validMoisture.length > 0 ? 
            validMoisture.reduce((sum, item) => sum + item.moisture, 0) / validMoisture.length : 0;
        const avgTemperature = validTemperature.length > 0 ? 
            validTemperature.reduce((sum, item) => sum + item.temperature, 0) / validTemperature.length : 0;
        const avgConductivity = validConductivity.length > 0 ? 
            validConductivity.reduce((sum, item) => sum + item.conductivity, 0) / validConductivity.length : 0;
        const avgPh = validPh.length > 0 ? 
            validPh.reduce((sum, item) => sum + item.ph, 0) / validPh.length : 0;

        document.getElementById('avgMoisture').textContent = avgMoisture.toFixed(2);
        document.getElementById('avgTemperature').textContent = avgTemperature.toFixed(2);
        document.getElementById('avgConductivity').textContent = avgConductivity.toFixed(2);
        document.getElementById('avgPh').textContent = avgPh.toFixed(2);
    }

    // 显示加载中
    function showLoading() {
        document.getElementById('loadingOverlay').style.display = 'flex';
    }

    // 隐藏加载中
    function hideLoading() {
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    // 格式化日期时间为本地字符串
    function formatDateTime(date) {
        return date.toLocaleString('zh-CN');
    }

    // 格式化日期时间为datetime-local input的值
    function formatDateTimeLocal(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');

        return `${year}-${month}-${day}T${hours}:${minutes}`;
    }
</script>
{% endblock %}
